# 添加了模糊音的自定义配置文件 rime_ice.custom.yaml
# https://github.com/Mark24Code/rime-auto-deploy/issues/1
patch: # 用打补丁的方式修改配置
  switches:
  # reset 的值表示设置 上一行的 states，0表示选中第一个，1表示选中第二个
    - name: ascii_mode
      states: [中, A]
      reset: 0 # 默认英文输入开始
    - name: ascii_punct # 中英标点
      states: [¥, $]
      reset: 0 
    - name: traditionalization
      states: [简, 繁]
      reset: 0
    - name: emoji
      states: [💀, 😄]
      reset: 1 # 默认开启表情包
    - name: full_shape
      states: [半角, 全角]
      reset: 0

  # 模糊音设置
  speller/algebra/+:
    - derive/eng$/en/
    - derive/en$/eng/
    - derive/in$/ing/
    - derive/ing$/in/